<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Walt Whitman's Broadway - Interactive</title>

    <!-- Leaflet CSS — must come before poem.css so our styles can override if needed -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>

    <!-- Page-specific styles -->
    <link rel="stylesheet" href="11_poem.css">

    <!-- Leaflet JavaScript — loaded in <head> as recommended for mapping libraries -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  </head>
  <body>
    <div class="container">
      <h1><em>Broadway</em> by Walt Whitman (Interactive)</h1>

      <div id="intro">
        <p>Click on highlighted words or phrases below to learn more about the literary devices used in the poem.</p>
      </div>

      <div id="poem">
        <!-- Poem text inserted here by poem.js -->
        Loading poem...
      </div>

      <hr>

      <!-- CHALLENGE 2 (map.js): Reset-view button sits above the info box -->
      <div id="info-header">
        <button id="zoomToNYC">Reset Map to NYC</button>
        <button id="clearButton">Clear Notes</button>
      </div>

      <div id="info">
        <!-- Literary device info inserted here by poem.js on term click -->
        <p>Click on a highlighted term above.</p>
      </div>

      <hr>

      <!-- Map section -->
      <h2>Map Context: New York City</h2>
      <div id="map"></div>
      <!-- End map section -->

    </div> <!-- End .container -->

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
            integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <!-- Poem interactivity (depends on jQuery) -->
    <script src="11_poem.js"></script>
    <!-- Map (depends on Leaflet, loaded above; uses jQuery for challenge button) -->
    <script src="11_map.js"></script>
  </body>
</html>
